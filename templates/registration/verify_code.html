{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-20 p-8 bg-white shadow-2xl rounded-xl border-t-4 border-brand text-center">
    <h2 class="text-2xl font-black text-gray-800 italic uppercase mb-4">Verifica tu Cuenta</h2>
    <p class="text-sm text-gray-500 mb-6">Ingresa el código de 6 dígitos que enviamos a tu correo de Gmail.</p>
    
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <input type="text" 
               name="codigo" 
               maxlength="6" 
               placeholder="000000" 
               required
               class="w-full text-center text-3xl font-bold tracking-widest border-2 border-gray-200 p-4 rounded-lg focus:border-brand outline-none">
        
        <button type="submit" class="w-full bg-brand text-white font-black py-4 rounded-lg hover:bg-black transition-all">
            ACTIVAR CUENTA
        </button>
    </form>
    
    <p class="mt-4 text-xs text-gray-400">¿No recibiste nada? Revisa tu carpeta de SPAM.</p>
</div>
{% endblock %}
