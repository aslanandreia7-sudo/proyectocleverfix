{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-20 p-10 bg-white shadow-2xl rounded-xl text-center border-b-8 border-green-500">
    <div class="mb-6">
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-100">
            <svg class="h-12 w-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
    </div>
    
    <h2 class="text-3xl font-black text-gray-800 uppercase italic mb-2">¡Cuenta Activada!</h2>

    <a href="{% url 'login' %}" class="inline-block w-full bg-brand hover:bg-black text-white font-bold py-3 px-6 rounded-lg transition-colors duration-300 shadow-lg">
        INICIAR SESIÓN AHORA
    </a>
    
    <p class="mt-6 text-[10px] text-gray-400 uppercase tracking-widest">Mexicali, Baja California</p>
